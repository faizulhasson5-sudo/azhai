<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="50%" style="stop-color:#1E293B"/>
      <stop offset="100%" style="stop-color:#0F172A"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#A78BFA"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  <circle cx="320" cy="80" r="100" fill="#8B5CF6" opacity="0.08"/>
  <circle cx="60" cy="340" r="70" fill="#2563EB" opacity="0.06"/>
  <circle cx="200" cy="200" r="150" fill="#8B5CF6" opacity="0.04"/>
  <g filter="url(#glow)">
    <rect x="100" y="100" width="200" height="120" rx="16" fill="#1E293B" stroke="url(#purple)" stroke-width="2"/>
    <rect x="120" y="120" width="100" height="10" rx="5" fill="#8B5CF6" opacity="0.8"/>
    <rect x="120" y="140" width="160" height="8" rx="4" fill="#475569" opacity="0.6"/>
    <rect x="120" y="156" width="130" height="8" rx="4" fill="#475569" opacity="0.4"/>
    <rect x="120" y="172" width="80" height="8" rx="4" fill="#475569" opacity="0.3"/>
    <circle cx="270" cy="140" r="22" fill="#8B5CF6" opacity="0.4"/>
    <text x="270" y="146" font-family="Arial,sans-serif" font-size="18" fill="white" text-anchor="middle" font-weight="bold">AI</text>
  </g>
  <text x="200" y="270" font-family="Arial,sans-serif" font-size="34" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="-1">AI OVERVIEW</text>
  <text x="200" y="305" font-family="Arial,sans-serif" font-size="22" fill="#A78BFA" text-anchor="middle" font-weight="600">OPTIMIZATION</text>
  <rect x="140" y="325" width="120" height="3" rx="1.5" fill="url(#purple)"/>
  <text x="200" y="360" font-family="Arial,sans-serif" font-size="13" fill="#94A3B8" text-anchor="middle" font-weight="500">GEO Complete Guide 2026</text>
</svg>