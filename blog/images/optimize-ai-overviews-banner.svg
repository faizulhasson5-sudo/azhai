      <text x="970" y="340" font-family="Arial,sans-serif" font-size="44" fill="#22C55E" text-anchor="middle" font-weight="bold">+40%</text>
      <text x="970" y="370" font-family="Arial,sans-serif" font-size="13" fill="#94A3B8" text-anchor="middle">Query Growth / Month</text>
