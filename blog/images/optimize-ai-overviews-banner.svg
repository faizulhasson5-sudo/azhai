    <rect x="80" y="160" width="520" height="6" rx="3" fill="url(#purple)" opacity="0.5"/>
    <rect x="80" y="182" width="400" height="4" rx="2" fill="#475569" opacity="0.4"/>
    <rect x="80" y="200" width="460" height="4" rx="2" fill="#475569" opacity="0.25"/>
    <text x="80" y="100" font-family="Arial,sans-serif" font-size="20" fill="#64748B" font-weight="600" letter-spacing="3">SEO STRATEGY 2026</text>
    <text x="80" y="145" font-family="Arial,sans-serif" font-size="56" font-weight="bold" fill="white" letter-spacing="-2">How to Optimize</text>
    <text x="80" y="145" font-family="Arial,sans-serif" font-size="56" font-weight="bold" fill="white" dy="60" letter-spacing="-2">for Google AI Overviews</text>
    <g filter="url(#textGlow)">
      <text x="80" y="305" font-family="Arial,sans-serif" font-size="34" fill="#A78BFA" font-weight="700" letter-spacing="-0.5">Generative Engine Optimization</text>
      <text x="80" y="345" font-family="Arial,sans-serif" font-size="34" fill="#A78BFA" font-weight="700">(GEO)</text>
    </g>
    <rect x="80" y="380" width="200" height="4" rx="2" fill="url(#blue)"/>
    <text x="80" y="425" font-family="Arial,sans-serif" font-size="16" fill="#94A3B8" letter-spacing="0.5">1B+ AI Mode users · Conversational queries · Multimodal search</text>
    <rect x="80" y="460" width="200" height="48" rx="24" fill="url(#purple)"/>
    <text x="180" y="490" font-family="Arial,sans-serif" font-size="16" fill="white" text-anchor="middle" font-weight="600" letter-spacing="0.5">Read the Guide</text>
    <g filter="url(#cardShadow)">
      <rect x="800" y="100" width="340" height="420" rx="20" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
      <rect x="800" y="100" width="340" height="420" rx="20" fill="url(#purple)" opacity="0.03"/>
      <text x="970" y="160" font-family="Arial,sans-serif" font-size="13" fill="#64748B" text-anchor="middle" font-weight="600" letter-spacing="2">AI MODE STATS</text>
      <text x="970" y="235" font-family="Arial,sans-serif" font-size="56" fill="#A78BFA" text-anchor="middle" font-weight="bold">1B+</text>
