<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B1120"/>
      <stop offset="50%" style="stop-color:#111827"/>
      <stop offset="100%" style="stop-color:#1A2332"/>
    </linearGradient>
    <linearGradient id="redAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#B91C1C"/>
      <stop offset="100%" style="stop-color:#EF4444"/>
    </linearGradient>
    <radialGradient id="ambientGlow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#DC2626;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#DC2626;stop-opacity:0"/>
    </radialGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.4"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <clipPath id="mainClip"><rect x="0" y="0" width="400" height="400" rx="12"/></clipPath>
  </defs>

  <g clip-path="url(#mainClip)">
    <rect width="400" height="400" fill="url(#bg)"/>
    <rect width="400" height="400" fill="url(#ambientGlow)"/>

    <!-- Subtle grid -->
    <g opacity="0.04" stroke="#3B82F6" stroke-width="0.5" fill="none">
      <path d="M0 0 L400 0 M0 50 L400 50 M0 100 L400 100 M0 150 L400 150 M0 200 L400 200 M0 250 L400 250 M0 300 L400 300 M0 350 L400 350 M0 400 L400 400"/>
      <path d="M0 0 L0 400 M50 0 L50 400 M100 0 L100 400 M150 0 L150 400 M200 0 L200 400 M250 0 L250 400 M300 0 L300 400 M350 0 L350 400 M400 0 L400 400"/>
    </g>

    <!-- Top accent -->
    <rect x="0" y="0" width="400" height="3" fill="url(#redAccent)" opacity="0.8"/>

    <!-- Category badge -->
    <rect x="30" y="40" width="110" height="24" rx="12" fill="#DC2626" opacity="0.15"/>
    <rect x="30" y="40" width="110" height="24" rx="12" fill="none" stroke="#DC2626" stroke-width="1" opacity="0.4"/>
    <text x="85" y="57" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#FCA5A5" text-anchor="middle" font-weight="600" letter-spacing="1.2">POLICY UPDATE</text>

    <!-- Main card -->
    <g filter="url(#shadow)">
      <rect x="30" y="80" width="340" height="200" rx="14" fill="#111827" stroke="#1F2937" stroke-width="1"/>

      <!-- Window dots -->
      <circle cx="56" cy="100" r="5" fill="#EF4444"/>
      <circle cx="74" cy="100" r="5" fill="#F59E0B"/>
      <circle cx="92" cy="100" r="5" fill="#22C55E"/>

      <!-- Card title -->
      <text x="200" y="104" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#64748B" text-anchor="middle" letter-spacing="1">GOOGLE SPAM POLICY</text>

      <!-- Red accent line -->
      <rect x="56" y="120" width="80" height="3" rx="1.5" fill="url(#redAccent)"/>

      <!-- Banned items preview -->
      <g>
        <rect x="56" y="138" width="20" height="20" rx="5" fill="#DC2626" opacity="0.12"/>
        <text x="66" y="153" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#EF4444" text-anchor="middle" font-weight="bold">1</text>
        <text x="86" y="153" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#E2E8F0" font-weight="500">Buying AI citations</text>
      </g>
      <g>
        <rect x="56" y="168" width="20" height="20" rx="5" fill="#DC2626" opacity="0.12"/>
        <text x="66" y="183" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#EF4444" text-anchor="middle" font-weight="bold">2</text>
        <text x="86" y="183" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#E2E8F0" font-weight="500">Fake brand mentions</text>
      </g>
      <g>
        <rect x="56" y="198" width="20" height="20" rx="5" fill="#DC2626" opacity="0.12"/>
        <text x="66" y="213" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#EF4444" text-anchor="middle" font-weight="bold">3</text>
        <text x="86" y="213" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#E2E8F0" font-weight="500">Undisclosed sponsorships</text>
      </g>

      <!-- Divider -->
      <rect x="56" y="235" width="288" height="1" fill="#1F2937"/>

      <!-- Still works -->
      <g>
        <circle cx="66" cy="255" r="8" fill="#16A34A" opacity="0.15"/>
        <text x="66" y="259" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#22C55E" text-anchor="middle" font-weight="bold">✓</text>
        <text x="82" y="259" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#94A3B8">E-E-A-T + Schema + Original Research</text>
      </g>
    </g>

    <!-- Bottom headline card -->
    <g filter="url(#shadow)">
      <rect x="30" y="300" width="340" height="80" rx="14" fill="#111827" stroke="#1F2937" stroke-width="1"/>
      <text x="200" y="335" font-family="'Segoe UI',Arial,sans-serif" font-size="26" font-weight="800" fill="#F8FAFC" text-anchor="middle" letter-spacing="-1">AI OVERVIEW</text>
      <text x="200" y="365" font-family="'Segoe UI',Arial,sans-serif" font-size="22" fill="#EF4444" text-anchor="middle" font-weight="700">SPAM POLICY</text>
    </g>

    <!-- Bottom accent -->
    <rect x="0" y="397" width="400" height="3" fill="url(#redAccent)" opacity="0.4"/>
  </g>
</svg>