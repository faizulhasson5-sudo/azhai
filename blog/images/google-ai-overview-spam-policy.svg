<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020617"/>
      <stop offset="50%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#1E293B"/>
    </linearGradient>
    <linearGradient id="red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DC2626"/>
      <stop offset="100%" style="stop-color:#EF4444"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16A34A"/>
      <stop offset="100%" style="stop-color:#22C55E"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#DC2626;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#DC2626;stop-opacity:0"/>
    </radialGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  <circle cx="200" cy="180" r="160" fill="url(#glow1)"/>
  <g opacity="0.1">
    <line x1="0" y1="80" x2="400" y2="80" stroke="#334155" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="400" y2="160" stroke="#334155" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="400" y2="240" stroke="#334155" stroke-width="0.5"/>
    <line x1="0" y1="320" x2="400" y2="320" stroke="#334155" stroke-width="0.5"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="80" y="60" width="240" height="120" rx="14" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
    <circle cx="120" cy="100" r="18" fill="url(#red)" opacity="0.9"/>
    <text x="120" y="106" font-family="Arial,sans-serif" font-size="20" fill="white" text-anchor="middle" font-weight="bold">!</text>
    <rect x="150" y="88" width="140" height="10" rx="5" fill="#EF4444" opacity="0.7"/>
    <rect x="150" y="106" width="100" height="8" rx="4" fill="#475569" opacity="0.5"/>
    <rect x="150" y="122" width="120" height="8" rx="4" fill="#475569" opacity="0.3"/>
    <rect x="100" y="148" width="80" height="22" rx="11" fill="url(#red)" opacity="0.8"/>
    <text x="140" y="163" font-family="Arial,sans-serif" font-size="10" fill="white" text-anchor="middle" font-weight="600">PENALTY</text>
    <rect x="190" y="148" width="80" height="22" rx="11" fill="none" stroke="#475569" stroke-width="1"/>
    <text x="230" y="163" font-family="Arial,sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">AUDIT</text>
  </g>
  <text x="200" y="240" font-family="Arial,sans-serif" font-size="28" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="-1">AI OVERVIEW</text>
  <text x="200" y="270" font-family="Arial,sans-serif" font-size="24" fill="#EF4444" text-anchor="middle" font-weight="700">SPAM POLICY</text>
  <rect x="120" y="290" width="160" height="3" rx="1.5" fill="url(#red)" opacity="0.7"/>
  <text x="200" y="325" font-family="Arial,sans-serif" font-size="13" fill="#94A3B8" text-anchor="middle" font-weight="500">Google Updates · July 2026</text>
  <g filter="url(#glow)">
    <circle cx="340" cy="340" r="30" fill="url(#green)" opacity="0.15"/>
    <text x="340" y="347" font-family="Arial,sans-serif" font-size="22" fill="#22C55E" text-anchor="middle" font-weight="bold">✓</text>
  </g>
</svg>