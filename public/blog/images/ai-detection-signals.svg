<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fafafa"/>
      <stop offset="100%" style="stop-color:#f0f0f0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="350" fill="url(#bg)" rx="8"/>
  <text x="400" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" fill="#0a0a0a" text-anchor="middle">Google's AI Detection Signal Flow</text>
  <!-- Step 1: Content Input -->
  <rect x="30" y="60" width="140" height="80" fill="#fff" rx="8" stroke="#e5e7eb" stroke-width="1"/>
  <text x="100" y="90" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#2563eb" text-anchor="middle">Content Input</text>
  <text x="100" y="110" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">Page text analyzed</text>
  <!-- Arrow -->
  <line x1="170" y1="100" x2="210" y2="100" stroke="#d1d5db" stroke-width="2" marker-end="url(#arrowhead)"/>
  <defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#d1d5db"/></marker></defs>
  <!-- Step 2: Statistical Analysis -->
  <rect x="220" y="60" width="140" height="80" fill="#fff" rx="8" stroke="#e5e7eb" stroke-width="1"/>
  <text x="290" y="90" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#2563eb" text-anchor="middle">Statistical Analysis</text>
  <text x="290" y="105" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">Perplexity</text>
  <text x="290" y="118" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">Burstiness</text>
  <text x="290" y="131" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">Token probability</text>
  <!-- Arrow -->
  <line x1="360" y1="100" x2="400" y2="100" stroke="#d1d5db" stroke-width="2" marker-end="url(#arrowhead)"/>
  <!-- Step 3: Pattern Matching -->
  <rect x="410" y="60" width="140" height="80" fill="#fff" rx="8" stroke="#e5e7eb" stroke-width="1"/>
  <text x="480" y="90" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#2563eb" text-anchor="middle">Pattern Matching</text>
  <text x="480" y="105" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">Training data overlap</text>
  <text x="480" y="118" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">Known AI outputs</text>
  <text x="480" y="131" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">Structural patterns</text>
  <!-- Arrow -->
  <line x1="550" y1="100" x2="590" y2="100" stroke="#d1d5db" stroke-width="2" marker-end="url(#arrowhead)"/>
  <!-- Step 4: Classification -->
  <rect x="600" y="60" width="170" height="80" fill="#fff" rx="8" stroke="#e5e7eb" stroke-width="1"/>
  <text x="685" y="90" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#2563eb" text-anchor="middle">Classification</text>
  <text x="685" y="105" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">AI confidence score</text>
  <text x="685" y="118" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">Human confidence score</text>
  <text x="685" y="131" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">Ambiguous zone</text>
  <!-- Signal boxes below -->
  <text x="400" y="180" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#374151" text-anchor="middle">Key Detection Signals</text>
  <rect x="30" y="200" width="170" height="60" fill="#eff6ff" rx="6" stroke="#bfdbfe" stroke-width="1"/>
  <text x="115" y="225" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="600" fill="#1d4ed8" text-anchor="middle">Perplexity Score</text>
  <text x="115" y="242" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">Word choice predictability</text>
  <rect x="215" y="200" width="170" height="60" fill="#eff6ff" rx="6" stroke="#bfdbfe" stroke-width="1"/>
  <text x="300" y="225" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="600" fill="#1d4ed8" text-anchor="middle">Burstiness Index</text>
  <text x="300" y="242" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">Sentence length variation</text>
  <rect x="400" y="200" width="170" height="60" fill="#eff6ff" rx="6" stroke="#bfdbfe" stroke-width="1"/>
  <text x="485" y="225" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="600" fill="#1d4ed8" text-anchor="middle">Token Probability</text>
  <text x="485" y="242" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">Next-word prediction fit</text>
  <rect x="585" y="200" width="185" height="60" fill="#eff6ff" rx="6" stroke="#bfdbfe" stroke-width="1"/>
  <text x="677" y="225" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="600" fill="#1d4ed8" text-anchor="middle">Vocabulary Diversity</text>
  <text x="677" y="242" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">Unique word ratio (TTR)</text>
  <!-- Bottom note -->
  <text x="400" y="300" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">Combined signals produce a confidence score from 0 (human) to 1 (AI)</text>
  <rect x="170" y="310" width="460" height="20" fill="#f3f4f6" rx="10"/>
  <rect x="170" y="310" width="130" height="20" fill="#2563eb" rx="10" opacity="0.7"/>
  <text x="235" y="324" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#fff" text-anchor="middle">Human</text>
  <text x="400" y="324" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">Ambiguous</text>
  <text x="540" y="324" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#dc2626" text-anchor="middle">AI-Generated</text>
</svg>