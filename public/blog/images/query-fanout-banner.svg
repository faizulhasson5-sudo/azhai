  <!-- Text -->
  <text x="600" y="370" font-family="system-ui,-apple-system,sans-serif" font-size="50" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="-1.5">Query Fan-Out</text>
  <text x="600" y="420" font-family="system-ui,-apple-system,sans-serif" font-size="26" font-weight="500" fill="#3b82f6" text-anchor="middle">The SEO Trend Changing Google Search in 2026</text>
  <text x="600" y="465" font-family="system-ui,-apple-system,sans-serif" font-size="15" fill="#64748b" text-anchor="middle">+2,550% Year-over-Year Growth</text>
