<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fafafa"/>
      <stop offset="100%" style="stop-color:#f0f0f0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)" rx="8"/>
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" font-weight="800" fill="#0a0a0a" letter-spacing="-0.02em">How E-E-A-T Evaluation Changed in 2026</text>
  <!-- Left: Before -->
  <rect x="30" y="55" width="350" height="320" rx="6" fill="#fff" stroke="#e5e5e5" stroke-width="1"/>
  <rect x="30" y="55" width="350" height="36" rx="6" fill="#0a0a0a"/>
  <rect x="30" y="75" width="350" height="16" fill="#0a0a0a"/>
  <text x="205" y="79" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#fff">2022 — 2024</text>
  <g transform="translate(55,110)">
    <text x="0" y="0" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#0a0a0a">Page-Level Signals</text>
    <circle cx="8" cy="20" r="4" fill="#a3a3a3"/>
    <text x="20" y="24" font-family="Arial,sans-serif" font-size="11" fill="#525252">Keyword optimization</text>
    <circle cx="8" cy="44" r="4" fill="#a3a3a3"/>
    <text x="20" y="48" font-family="Arial,sans-serif" font-size="11" fill="#525252">Content length targets</text>
    <circle cx="8" cy="68" r="4" fill="#a3a3a3"/>
    <text x="20" y="72" font-family="Arial,sans-serif" font-size="11" fill="#525252">Basic author bio</text>
    <circle cx="8" cy="92" r="4" fill="#a3a3a3"/>
    <text x="20" y="96" font-family="Arial,sans-serif" font-size="11" fill="#525252">Backlink quantity focus</text>
    <circle cx="8" cy="116" r="4" fill="#a3a3a3"/>
    <text x="20" y="120" font-family="Arial,sans-serif" font-size="11" fill="#525252">Generic "about us" page</text>
    <circle cx="8" cy="140" r="4" fill="#a3a3a3"/>
    <text x="20" y="144" font-family="Arial,sans-serif" font-size="11" fill="#525252">Citation = endorsement</text>
  </g>
  <text x="205" y="355" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="600" fill="#a3a3a3" text-transform="uppercase" letter-spacing="0.08em">PAGE EVALUATION</text>
  <!-- Right: After -->
  <rect x="420" y="55" width="350" height="320" rx="6" fill="#fff" stroke="#2563eb" stroke-width="1.5"/>
  <rect x="420" y="55" width="350" height="36" rx="6" fill="#2563eb"/>
  <rect x="420" y="75" width="350" height="16" fill="#2563eb"/>
  <text x="595" y="79" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#fff">2025 — 2026</text>
  <g transform="translate(445,110)">
    <text x="0" y="0" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#0a0a0a">Entity-Level Verification</text>
    <circle cx="8" cy="20" r="4" fill="#2563eb"/>
    <text x="20" y="24" font-family="Arial,sans-serif" font-size="11" fill="#525252">Named author entities</text>
    <circle cx="8" cy="44" r="4" fill="#2563eb"/>
    <text x="20" y="48" font-family="Arial,sans-serif" font-size="11" fill="#525252">Cross-web identity proof</text>
    <circle cx="8" cy="68" r="4" fill="#2563eb"/>
    <text x="20" y="72" font-family="Arial,sans-serif" font-size="11" fill="#525252">Knowledge Graph inclusion</text>
    <circle cx="8" cy="92" r="4" fill="#2563eb"/>
    <text x="20" y="96" font-family="Arial,sans-serif" font-size="11" fill="#525252">Brand mention authority</text>
    <circle cx="8" cy="116" r="4" fill="#2563eb"/>
    <text x="20" y="120" font-family="Arial,sans-serif" font-size="11" fill="#525252">Structured data completeness</text>
    <circle cx="8" cy="140" r="4" fill="#2563eb"/>
    <text x="20" y="144" font-family="Arial,sans-serif" font-size="11" fill="#525252">Citation ≠ endorsement</text>
  </g>
  <text x="595" y="355" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="600" fill="#2563eb" text-transform="uppercase" letter-spacing="0.08em">ENTITY VERIFICATION</text>
  <!-- Arrow -->
  <g transform="translate(395,200)">
    <rect x="-10" y="-14" width="20" height="28" rx="4" fill="#2563eb"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" font-weight="900" fill="#fff">→</text>
  </g>
</svg>
