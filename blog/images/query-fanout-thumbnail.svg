<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)" rx="8"/>
  <!-- Fan-out visualization -->
  <g stroke="#2563eb" stroke-width="2" opacity="0.5">
    <line x1="200" y1="100" x2="100" y2="50"/>
    <line x1="200" y1="100" x2="150" y2="40"/>
    <line x1="200" y1="100" x2="200" y2="35"/>
    <line x1="200" y1="100" x2="250" y2="40"/>
    <line x1="200" y1="100" x2="300" y2="50"/>
  </g>
  <circle cx="200" cy="100" r="12" fill="#2563eb"/>
  <circle cx="100" cy="50" r="6" fill="#3b82f6" opacity="0.7"/>
  <circle cx="150" cy="40" r="6" fill="#3b82f6" opacity="0.7"/>
  <circle cx="200" cy="35" r="6" fill="#3b82f6" opacity="0.7"/>
  <circle cx="250" cy="40" r="6" fill="#3b82f6" opacity="0.7"/>
  <circle cx="300" cy="50" r="6" fill="#3b82f6" opacity="0.7"/>
  <!-- Text -->
  <text x="200" y="160" font-family="system-ui,-apple-system,sans-serif" font-size="28" font-weight="800" fill="#fff" text-anchor="middle">Query Fan-Out</text>
  <text x="200" y="190" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#3b82f6" text-anchor="middle">SEO Guide 2026</text>
  <text x="200" y="240" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#64748b" text-anchor="middle">+2,550% YoY Growth</text>
</svg>