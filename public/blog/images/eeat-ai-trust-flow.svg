<svg xmlns="http://www.w3.org/2000/svg" width="800" height="350" viewBox="0 0 800 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fafafa"/>
      <stop offset="100%" style="stop-color:#f0f0f0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="350" fill="url(#bg)" rx="8"/>
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" font-weight="800" fill="#0a0a0a" letter-spacing="-0.02em">How Google AI Overviews Evaluate Trust</text>
  <!-- Left: Source Discovery -->
  <g transform="translate(40,55)">
    <rect width="210" height="270" rx="6" fill="#fff" stroke="#e5e5e5" stroke-width="1"/>
    <rect width="210" height="32" rx="6" fill="#0a0a0a"/>
    <rect width="210" height="14" y="18" fill="#0a0a0a"/>
    <text x="105" y="23" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#fff">1. DISCOVERY</text>
    <g transform="translate(16,44)">
      <text x="0" y="0" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#2563eb">What Google crawls</text>
      <text x="0" y="18" font-family="Arial,sans-serif" font-size="10" fill="#525252">• Author page + Person schema</text>
      <text x="0" y="34" font-family="Arial,sans-serif" font-size="10" fill="#525252">• About / Team page</text>
      <text x="0" y="50" font-family="Arial,sans-serif" font-size="10" fill="#525252">• Editorial policy page</text>
      <text x="0" y="66" font-family="Arial,sans-serif" font-size="10" fill="#525252">• HTTPS + contact info</text>
      <text x="0" y="82" font-family="Arial,sans-serif" font-size="10" fill="#525252">• Organization schema</text>
      <text x="0" y="105" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#2563eb">What AI retrieves</text>
      <text x="0" y="123" font-family="Arial,sans-serif" font-size="10" fill="#525252">• Named-author content</text>
      <text x="0" y="139" font-family="Arial,sans-serif" font-size="10" fill="#525252">• Cross-referenced credentials</text>
      <text x="0" y="155" font-family="Arial,sans-serif" font-size="10" fill="#525252">• Fresh, specific content</text>
    </g>
  </g>
  <!-- Middle: Entity Resolution -->
  <g transform="translate(295,55)">
    <rect width="210" height="270" rx="6" fill="#fff" stroke="#2563eb" stroke-width="1.5"/>
    <rect width="210" height="32" rx="6" fill="#2563eb"/>
    <rect width="210" height="14" y="18" fill="#2563eb"/>
    <text x="105" y="23" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#fff">2. RESOLUTION</text>
    <g transform="translate(16,44)">
      <text x="0" y="0" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#2563eb">Entity matching</text>
      <text x="0" y="18" font-family="Arial,sans-serif" font-size="10" fill="#525252">• Author → LinkedIn profile</text>
      <text x="0" y="34" font-family="Arial,sans-serif" font-size="10" fill="#525252">• Author → publications</text>
      <text x="0" y="50" font-family="Arial,sans-serif" font-size="10" fill="#525252">• Brand → Knowledge Graph</text>
      <text x="0" y="66" font-family="Arial,sans-serif" font-size="10" fill="#525252">• Brand → industry mentions</text>
      <text x="0" y="82" font-family="Arial,sans-serif" font-size="10" fill="#525252">• Topic → domain authority</text>
      <text x="0" y="105" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#2563eb">Confidence score</text>
      <text x="0" y="123" font-family="Arial,sans-serif" font-size="10" fill="#525252">• Consistent identity = high</text>
      <text x="0" y="139" font-family="Arial,sans-serif" font-size="10" fill="#525252">• Mismatched signals = low</text>
      <text x="0" y="155" font-family="Arial,sans-serif" font-size="10" fill="#525252">• No entity record = ignored</text>
    </g>
  </g>
  <!-- Right: Citation Decision -->
  <g transform="translate(550,55)">
    <rect width="210" height="270" rx="6" fill="#fff" stroke="#e5e5e5" stroke-width="1"/>
    <rect width="210" height="32" rx="6" fill="#16a34a"/>
    <rect width="210" height="14" y="18" fill="#16a34a"/>
    <text x="105" y="23" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#fff">3. DECISION</text>
    <g transform="translate(16,44)">
      <text x="0" y="0" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#16a34a">Cited AND recommended</text>
      <text x="0" y="18" font-family="Arial,sans-serif" font-size="10" fill="#525252">• Verified entity + trust</text>
      <text x="0" y="34" font-family="Arial,sans-serif" font-size="10" fill="#525252">• Strongest authority in set</text>
      <text x="0" y="56" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#d97706">Cited but NOT recommended</text>
      <text x="0" y="74" font-family="Arial,sans-serif" font-size="10" fill="#525252">• Good content, weak trust</text>
      <text x="0" y="90" font-family="Arial,sans-serif" font-size="10" fill="#525252">• Self-promotional listicle</text>
      <text x="0" y="112" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#dc2626">Not cited at all</text>
      <text x="0" y="130" font-family="Arial,sans-serif" font-size="10" fill="#525252">• No verifiable author</text>
      <text x="0" y="146" font-family="Arial,sans-serif" font-size="10" fill="#525252">• No entity record</text>
      <text x="0" y="162" font-family="Arial,sans-serif" font-size="10" fill="#525252">• Thin or unverifiable trust</text>
    </g>
  </g>
  <!-- Connecting arrows -->
  <g transform="translate(258,190)">
    <rect x="-6" y="-10" width="32" height="20" rx="4" fill="#2563eb"/>
    <text x="10" y="5" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="900" fill="#fff">→</text>
  </g>
  <g transform="translate(513,190)">
    <rect x="-6" y="-10" width="32" height="20" rx="4" fill="#2563eb"/>
    <text x="10" y="5" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="900" fill="#fff">→</text>
  </g>
</svg>
