  <!-- Keywords inside lens -->
  <text x="460" y="250" font-family="DM Mono,monospace" font-size="14" fill="#3b82f6" opacity="0.8">keyword_1</text>
  <text x="480" y="280" font-family="DM Mono,monospace" font-size="16" fill="#60a5fa" font-weight="600">trending</text>
