<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <rect width="800" height="450" fill="#0a0a0a"/>
  <line x1="0" y1="50" x2="800" y2="50" stroke="#1a1a1a"/>
  <line x1="0" y1="100" x2="800" y2="100" stroke="#1a1a1a"/>
  <line x1="0" y1="150" x2="800" y2="150" stroke="#1a1a1a"/>
  <line x1="0" y1="200" x2="800" y2="200" stroke="#1a1a1a"/>
  <line x1="0" y1="250" x2="800" y2="250" stroke="#1a1a1a"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#1a1a1a"/>
  <line x1="0" y1="350" x2="800" y2="350" stroke="#1a1a1a"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#1a1a1a"/>
  <line x1="200" y1="0" x2="200" y2="450" stroke="#1a1a1a"/>
  <line x1="400" y1="0" x2="400" y2="450" stroke="#1a1a1a"/>
  <line x1="600" y1="0" x2="600" y2="450" stroke="#1a1a1a"/>
  <!-- Search result snippet -->
  <rect x="150" y="120" width="500" height="120" rx="6" fill="#171717" stroke="#262626"/>
  <text x="180" y="155" fill="#2563eb" font-size="16" font-family="system-ui">Your Blog Title | Brand</text>
  <text x="180" y="180" fill="#a3a3a3" font-size="12" font-family="system-ui">https://yoursite.com/blog</text>
  <text x="180" y="210" fill="#fafafa" font-size="13" font-family="system-ui">Compelling meta description that entices clicks...</text>
  <!-- CTR badge -->
  <rect x="280" y="300" width="240" height="60" rx="8" fill="#2563eb" opacity="0.15"/>
  <text x="400" y="338" fill="#2563eb" font-size="28" text-anchor="middle" font-family="system-ui" font-weight="700">+32% CTR</text>
  <text x="400" y="400" fill="#a3a3a3" font-size="16" text-anchor="middle" font-family="system-ui, sans-serif">Write Meta Descriptions</text>
  <text x="400" y="425" fill="#2563eb" font-size="12" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="500">That Get Clicks</text>
</svg>
