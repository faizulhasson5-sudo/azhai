<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  <!-- Grid pattern -->
  <g opacity="0.06">
    <line x1="0" y1="0" x2="400" y2="400" stroke="#fff" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="0" y2="400" stroke="#fff" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="400" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="400" y2="200" stroke="#fff" stroke-width="0.5"/>
  </g>
  <!-- Shield icon -->
  <g transform="translate(200,155)">
    <path d="M0-50 L40-30 L40,15 Q40,50 0,70 Q-40,50 -40,15 L-40,-30 Z" fill="none" stroke="#2563eb" stroke-width="3" opacity="0.9"/>
    <path d="M0-35 L28-20 L28,10 Q28,38 0,52 Q-28,38 -28,10 L-28,-20 Z" fill="#2563eb" opacity="0.15"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial,sans-serif" font-size="36" font-weight="900" fill="#fff">E</text>
    <text x="0" y="25" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="600" fill="#2563eb" letter-spacing="0.1em">TRUST</text>
  </g>
  <!-- 4 dots -->
  <g transform="translate(200,260)">
    <circle cx="-45" cy="0" r="6" fill="#2563eb"/>
    <circle cx="-15" cy="0" r="6" fill="#2563eb" opacity="0.7"/>
    <circle cx="15" cy="0" r="6" fill="#2563eb" opacity="0.5"/>
    <circle cx="45" cy="0" r="6" fill="#2563eb" opacity="0.3"/>
  </g>
  <text x="200" y="300" text-anchor="middle" font-family="Arial,sans-serif" font-size="28" font-weight="900" fill="#fff" letter-spacing="-0.02em">E-E-A-T</text>
  <text x="200" y="325" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="500" fill="#a3a3a3">2026 Guide</text>
  <!-- Corner accent -->
  <rect x="0" y="0" width="6" height="80" fill="#2563eb"/>
</svg>
