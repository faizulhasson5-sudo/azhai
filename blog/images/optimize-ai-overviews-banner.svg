      <text x="970" y="435" font-family="Arial,sans-serif" font-size="32" fill="#F59E0B" text-anchor="middle" font-weight="bold">1 in 6</text>
      <text x="970" y="462" font-family="Arial,sans-serif" font-size="12" fill="#94A3B8" text-anchor="middle">Searches Are Multimodal</text>
      <rect x="860" y="480" width="220" height="1" fill="#334155" opacity="0.6"/>
      <text x="970" y="508" font-family="Arial,sans-serif" font-size="11" fill="#64748B" text-anchor="middle" letter-spacing="1">SOURCE: GOOGLE 2026</text>
