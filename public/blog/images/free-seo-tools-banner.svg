  <text x="240" y="170" fill="#2563eb" font-size="32" text-anchor="middle" font-family="system-ui">C</text>
  <rect x="320" y="120" width="80" height="80" rx="12" fill="#171717" stroke="#262626"/>
  <text x="360" y="170" fill="#2563eb" font-size="32" text-anchor="middle" font-family="system-ui">K</text>
