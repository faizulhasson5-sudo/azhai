      <line x1="0" y1="480" x2="1200" y2="480" stroke="#334155" stroke-width="0.5"/>
      <line x1="0" y1="560" x2="1200" y2="560" stroke="#334155" stroke-width="0.5"/>
      <line x1="120" y1="0" x2="120" y2="630" stroke="#334155" stroke-width="0.5"/>
      <line x1="240" y1="0" x2="240" y2="630" stroke="#334155" stroke-width="0.5"/>
      <line x1="360" y1="0" x2="360" y2="630" stroke="#334155" stroke-width="0.5"/>
      <line x1="480" y1="0" x2="480" y2="630" stroke="#334155" stroke-width="0.5"/>
      <line x1="600" y1="0" x2="600" y2="630" stroke="#334155" stroke-width="0.5"/>
      <line x1="720" y1="0" x2="720" y2="630" stroke="#334155" stroke-width="0.5"/>
      <line x1="840" y1="0" x2="840" y2="630" stroke="#334155" stroke-width="0.5"/>
      <line x1="960" y1="0" x2="960" y2="630" stroke="#334155" stroke-width="0.5"/>
      <line x1="1080" y1="0" x2="1080" y2="630" stroke="#334155" stroke-width="0.5"/>
