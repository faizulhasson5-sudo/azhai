<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B1120"/>
      <stop offset="30%" style="stop-color:#111827"/>
      <stop offset="70%" style="stop-color:#1A2332"/>
      <stop offset="100%" style="stop-color:#0B1120"/>
    </linearGradient>
    <linearGradient id="redAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#B91C1C"/>
      <stop offset="50%" style="stop-color:#DC2626"/>
      <stop offset="100%" style="stop-color:#EF4444"/>
    </linearGradient>
    <linearGradient id="greenAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#15803D"/>
      <stop offset="100%" style="stop-color:#22C55E"/>
    </linearGradient>
    <linearGradient id="blueAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1D4ED8"/>
      <stop offset="100%" style="stop-color:#3B82F6"/>
    </linearGradient>
    <linearGradient id="goldAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#B45309"/>
      <stop offset="100%" style="stop-color:#F59E0B"/>
    </linearGradient>
    <radialGradient id="ambientGlow" cx="15%" cy="25%" r="60%">
      <stop offset="0%" style="stop-color:#DC2626;stop-opacity:0.06"/>
      <stop offset="100%" style="stop-color:#DC2626;stop-opacity:0"/>
    </radialGradient>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="8" stdDeviation="24" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="mainClip"><rect x="0" y="0" width="1200" height="630" rx="0"/></clipPath>
  </defs>

  <g clip-path="url(#mainClip)">
    <rect width="1200" height="630" fill="url(#bg)"/>
    <rect width="1200" height="630" fill="url(#ambientGlow)"/>

    <!-- Subtle grid -->
    <g opacity="0.04" stroke="#3B82F6" stroke-width="0.5" fill="none">
      <path d="M0 0 L1200 0 M0 63 L1200 63 M0 126 L1200 126 M0 189 L1200 189 M0 252 L1200 252 M0 315 L1200 315 M0 378 L1200 378 M0 441 L1200 441 M0 504 L1200 504 M0 567 L1200 567 M0 630 L1200 630"/>
      <path d="M0 0 L0 630 M120 0 L120 630 M240 0 L240 630 M360 0 L360 630 M480 0 L480 630 M600 0 L600 630 M720 0 L720 630 M840 0 L840 630 M960 0 L960 630 M1080 0 L1080 630 M1200 0 L1200 630"/>
    </g>

    <!-- Decorative circuit-like lines -->
    <g stroke="#334155" stroke-width="1" fill="none" opacity="0.15">
      <path d="M0 200 L80 200 L100 180 L200 180"/>
      <path d="M0 430 L60 430 L80 410 L140 410"/>
      <circle cx="200" cy="180" r="3" fill="#3B82F6" opacity="0.4"/>
      <circle cx="140" cy="410" r="3" fill="#3B82F6" opacity="0.4"/>
    </g>

    <!-- Top accent line -->
    <rect x="0" y="0" width="1200" height="3" fill="url(#redAccent)" opacity="0.8"/>

    <!-- Left content area -->
    <g>
      <!-- Category badge -->
      <rect x="70" y="70" width="130" height="28" rx="14" fill="#DC2626" opacity="0.15"/>
      <rect x="70" y="70" width="130" height="28" rx="14" fill="none" stroke="#DC2626" stroke-width="1" opacity="0.4"/>
      <text x="135" y="89" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#FCA5A5" text-anchor="middle" font-weight="600" letter-spacing="1.5">POLICY UPDATE</text>

      <!-- Main headline -->
      <text x="70" y="145" font-family="'Segoe UI',Arial,sans-serif" font-size="48" font-weight="800" fill="#F8FAFC" letter-spacing="-1.5">Google Now Treats</text>
      <text x="70" y="200" font-family="'Segoe UI',Arial,sans-serif" font-size="48" font-weight="800" fill="#F8FAFC" letter-spacing="-1.5">AI Overview Spam</text>

      <!-- Red accent underline -->
      <rect x="70" y="218" width="280" height="4" rx="2" fill="url(#redAccent)"/>

      <!-- Sub-headline -->
      <text x="70" y="260" font-family="'Segoe UI',Arial,sans-serif" font-size="28" font-weight="700" fill="#EF4444" letter-spacing="-0.5">As Real Spam</text>

      <!-- Description -->
      <text x="70" y="300" font-family="'Segoe UI',Arial,sans-serif" font-size="15" fill="#94A3B8" letter-spacing="0.2">Manipulating AI answers now carries the same penalties</text>
      <text x="70" y="322" font-family="'Segoe UI',Arial,sans-serif" font-size="15" fill="#94A3B8" letter-spacing="0.2">as link schemes and cloaking.</text>

      <!-- Meta info -->
      <rect x="70" y="355" width="1" height="40" fill="#334155"/>
      <text x="85" y="375" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#64748B" letter-spacing="0.5">JULY 2026</text>
      <rect x="170" y="355" width="1" height="40" fill="#334155"/>
      <text x="185" y="375" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#64748B" letter-spacing="0.5">12 MIN READ</text>

      <!-- CTA button -->
      <rect x="70" y="410" width="200" height="48" rx="24" fill="url(#redAccent)"/>
      <text x="170" y="440" font-family="'Segoe UI',Arial,sans-serif" font-size="15" fill="white" text-anchor="middle" font-weight="600" letter-spacing="0.5">Read the Analysis</text>
    </g>

    <!-- Right side - Stats & Info Cards -->
    <g filter="url(#cardShadow)">
      <!-- Main card -->
      <rect x="700" y="55" width="440" height="520" rx="16" fill="#111827" stroke="#1F2937" stroke-width="1"/>

      <!-- Card header -->
      <rect x="700" y="55" width="440" height="50" rx="16" fill="#1F2937"/>
      <rect x="700" y="90" width="440" height="15" fill="#1F2937"/>
      <circle cx="730" cy="80" r="6" fill="#EF4444"/>
      <circle cx="750" cy="80" r="6" fill="#F59E0B"/>
      <circle cx="770" cy="80" r="6" fill="#22C55E"/>
      <text x="920" y="85" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#64748B" text-anchor="middle" letter-spacing="1">WHAT CHANGED</text>

      <!-- Banned items -->
      <g>
        <rect x="730" y="130" width="28" height="28" rx="6" fill="#DC2626" opacity="0.12"/>
        <text x="744" y="149" font-family="'Segoe UI',Arial,sans-serif" font-size="16" fill="#EF4444" text-anchor="middle" font-weight="bold">1</text>
        <text x="770" y="149" font-family="'Segoe UI',Arial,sans-serif" font-size="14" fill="#E2E8F0" font-weight="500">Buying AI citations</text>
      </g>
      <g>
        <rect x="730" y="172" width="28" height="28" rx="6" fill="#DC2626" opacity="0.12"/>
        <text x="744" y="191" font-family="'Segoe UI',Arial,sans-serif" font-size="16" fill="#EF4444" text-anchor="middle" font-weight="bold">2</text>
        <text x="770" y="191" font-family="'Segoe UI',Arial,sans-serif" font-size="14" fill="#E2E8F0" font-weight="500">Fake brand mentions for AI</text>
      </g>
      <g>
        <rect x="730" y="214" width="28" height="28" rx="6" fill="#DC2626" opacity="0.12"/>
        <text x="744" y="233" font-family="'Segoe UI',Arial,sans-serif" font-size="16" fill="#EF4444" text-anchor="middle" font-weight="bold">3</text>
        <text x="770" y="233" font-family="'Segoe UI',Arial,sans-serif" font-size="14" fill="#E2E8F0" font-weight="500">Undisclosed sponsored content</text>
      </g>
      <g>
        <rect x="730" y="256" width="28" height="28" rx="6" fill="#DC2626" opacity="0.12"/>
        <text x="744" y="275" font-family="'Segoe UI',Arial,sans-serif" font-size="16" fill="#EF4444" text-anchor="middle" font-weight="bold">4</text>
        <text x="770" y="275" font-family="'Segoe UI',Arial,sans-serif" font-size="14" fill="#E2E8F0" font-weight="500">Manipulative structured data</text>
      </g>
      <g>
        <rect x="730" y="298" width="28" height="28" rx="6" fill="#DC2626" opacity="0.12"/>
        <text x="744" y="317" font-family="'Segoe UI',Arial,sans-serif" font-size="16" fill="#EF4444" text-anchor="middle" font-weight="bold">5</text>
        <text x="770" y="317" font-family="'Segoe UI',Arial,sans-serif" font-size="14" fill="#E2E8F0" font-weight="500">AI-generated spam content</text>
      </g>

      <!-- Divider -->
      <rect x="740" y="345" width="380" height="1" fill="#1F2937"/>

      <!-- Allowed items -->
      <text x="740" y="375" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#64748B" letter-spacing="1.5" font-weight="600">STILL WORKS</text>
      <g>
        <circle cx="746" cy="402" r="10" fill="#16A34A" opacity="0.15"/>
        <text x="746" y="407" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#22C55E" text-anchor="middle" font-weight="bold">✓</text>
        <text x="766" y="407" font-family="'Segoe UI',Arial,sans-serif" font-size="13" fill="#CBD5E1">E-E-A-T content &amp; expertise</text>
      </g>
      <g>
        <circle cx="746" cy="435" r="10" fill="#16A34A" opacity="0.15"/>
        <text x="746" y="440" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#22C55E" text-anchor="middle" font-weight="bold">✓</text>
        <text x="766" y="440" font-family="'Segoe UI',Arial,sans-serif" font-size="13" fill="#CBD5E1">Schema markup (accurate)</text>
      </g>
      <g>
        <circle cx="746" cy="468" r="10" fill="#16A34A" opacity="0.15"/>
        <text x="746" y="473" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#22C55E" text-anchor="middle" font-weight="bold">✓</text>
        <text x="766" y="473" font-family="'Segoe UI',Arial,sans-serif" font-size="13" fill="#CBD5E1">Original research &amp; data</text>
      </g>
      <g>
        <circle cx="746" cy="501" r="10" fill="#16A34A" opacity="0.15"/>
        <text x="746" y="506" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#22C55E" text-anchor="middle" font-weight="bold">✓</text>
        <text x="766" y="506" font-family="'Segoe UI',Arial,sans-serif" font-size="13" fill="#CBD5E1">Legitimate editorial backlinks</text>
      </g>

      <!-- Bottom source -->
      <rect x="700" y="530" width="440" height="45" rx="0 0 16 16" fill="#0F172A"/>
      <text x="920" y="558" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#475569" text-anchor="middle" letter-spacing="1">SOURCE: GOOGLE SPAM POLICIES · JUNE 2026</text>
    </g>

    <!-- Bottom accent line -->
    <rect x="0" y="627" width="1200" height="3" fill="url(#redAccent)" opacity="0.4"/>
  </g>
</svg>