<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Page Not Found - Free AI Text Tools</title>
<meta name="description" content="The page you are looking for does not exist.">
<meta name="robots" content="noindex">
<link rel="stylesheet" href="css/style.css">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
<script>
(function(){
  try {
    var t = localStorage.getItem('attTheme');
    if (t) document.documentElement.setAttribute('data-theme', t);
  } catch(e) {}
})();
</script>
</head>
<body>
<div class="container page-content" style="text-align:center;padding:80px 24px">
<h1 style="font-size:72px;margin-bottom:16px">404</h1>
<h2>Page Not Found</h2>
<p style="color:var(--text-2);margin:16px 0 32px">The page you are looking for does not exist or has been moved.</p>
<a href="/" class="btn btn-primary" style="display:inline-block">Go to Homepage</a>
&nbsp;&nbsp;
<a href="/tools/" class="btn btn-secondary" style="display:inline-block">Browse Tools</a>
</div>
<script src="js/app.js"></script>
</body>
</html>
