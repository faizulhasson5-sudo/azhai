<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020617"/>
      <stop offset="40%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#1E293B"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="50%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#A78BFA"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563EB"/>
      <stop offset="100%" style="stop-color:#3B82F6"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#2563EB;stop-opacity:0"/>
    </radialGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <clipPath id="roundedClip"><rect x="0" y="0" width="400" height="400" rx="16"/></clipPath>
  </defs>
  <g clip-path="url(#roundedClip)">
    <rect width="400" height="400" fill="url(#bg)"/>
    <circle cx="320" cy="60" r="140" fill="url(#glow1)"/>
    <circle cx="60" cy="350" r="100" fill="url(#glow2)"/>
    <circle cx="200" cy="200" r="180" fill="#8B5CF6" opacity="0.03"/>
    <g opacity="0.15">
      <line x1="0" y1="80" x2="400" y2="80" stroke="#334155" stroke-width="0.5"/>
      <line x1="0" y1="160" x2="400" y2="160" stroke="#334155" stroke-width="0.5"/>
      <line x1="0" y1="240" x2="400" y2="240" stroke="#334155" stroke-width="0.5"/>
      <line x1="0" y1="320" x2="400" y2="320" stroke="#334155" stroke-width="0.5"/>
      <line x1="80" y1="0" x2="80" y2="400" stroke="#334155" stroke-width="0.5"/>
      <line x1="160" y1="0" x2="160" y2="400" stroke="#334155" stroke-width="0.5"/>
      <line x1="240" y1="0" x2="240" y2="400" stroke="#334155" stroke-width="0.5"/>
      <line x1="320" y1="0" x2="320" y2="400" stroke="#334155" stroke-width="0.5"/>
    </g>
    <g filter="url(#cardShadow)">
      <rect x="50" y="90" width="300" height="140" rx="14" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
      <rect x="50" y="90" width="300" height="140" rx="14" fill="url(#purple)" opacity="0.05"/>
      <rect x="72" y="112" width="110" height="12" rx="6" fill="url(#purple)" opacity="0.9"/>
      <rect x="72" y="134" width="200" height="9" rx="4.5" fill="#475569" opacity="0.6"/>
      <rect x="72" y="151" width="170" height="9" rx="4.5" fill="#475569" opacity="0.4"/>
      <rect x="72" y="168" width="130" height="9" rx="4.5" fill="#475569" opacity="0.25"/>
      <rect x="72" y="192" width="60" height="20" rx="10" fill="url(#blue)" opacity="0.8"/>
      <text x="102" y="206" font-family="Arial,sans-serif" font-size="10" fill="white" text-anchor="middle" font-weight="600">Explore</text>
      <rect x="142" y="192" width="60" height="20" rx="10" fill="none" stroke="#475569" stroke-width="1"/>
      <text x="172" y="206" font-family="Arial,sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">Decide</text>
      <circle cx="310" cy="140" r="28" fill="#8B5CF6" opacity="0.2"/>
      <circle cx="310" cy="140" r="20" fill="#8B5CF6" opacity="0.3"/>
      <text x="310" y="147" font-family="Arial,sans-serif" font-size="20" fill="white" text-anchor="middle" font-weight="bold">AI</text>
    </g>
    <text x="200" y="280" font-family="Arial,sans-serif" font-size="36" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="-1.5">AI OVERVIEW</text>
    <text x="200" y="312" font-family="Arial,sans-serif" font-size="22" fill="#A78BFA" text-anchor="middle" font-weight="600" letter-spacing="3">OPTIMIZATION</text>
    <rect x="130" y="330" width="140" height="3" rx="1.5" fill="url(#purple)" opacity="0.8"/>
    <text x="200" y="365" font-family="Arial,sans-serif" font-size="12" fill="#64748B" text-anchor="middle" font-weight="500" letter-spacing="1">GEO · COMPLETE GUIDE · 2026</text>
  </g>
</svg>