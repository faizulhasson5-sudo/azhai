<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="50%" style="stop-color:#111827"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="400" fill="url(#bg)"/>
  <!-- Subtle grid -->
  <g opacity="0.04">
    <line x1="0" y1="0" x2="1200" y2="400" stroke="#fff" stroke-width="0.5"/>
    <line x1="1200" y1="0" x2="0" y2="400" stroke="#fff" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="400" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#fff" stroke-width="0.5"/>
  </g>
  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="400" fill="#2563eb"/>
  <!-- Shield icons representing 4 pillars -->
  <g transform="translate(250,160)">
    <path d="M0-40 L30-24 L30,12 Q30,40 0,55 Q-30,40 -30,12 L-30,-24 Z" fill="#2563eb" opacity="0.2" stroke="#2563eb" stroke-width="2"/>
    <text x="0" y="8" text-anchor="middle" font-family="Arial,sans-serif" font-size="28" font-weight="900" fill="#fff">E</text>
    <text x="0" y="75" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="600" fill="#a3a3a3">Experience</text>
  </g>
  <g transform="translate(400,160)">
    <path d="M0-40 L30-24 L30,12 Q30,40 0,55 Q-30,40 -30,12 L-30,-24 Z" fill="#2563eb" opacity="0.35" stroke="#2563eb" stroke-width="2"/>
    <text x="0" y="8" text-anchor="middle" font-family="Arial,sans-serif" font-size="28" font-weight="900" fill="#fff">E</text>
    <text x="0" y="75" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="600" fill="#a3a3a3">Expertise</text>
  </g>
  <g transform="translate(550,160)">
    <path d="M0-40 L30-24 L30,12 Q30,40 0,55 Q-30,40 -30,12 L-30,-24 Z" fill="#2563eb" opacity="0.55" stroke="#2563eb" stroke-width="2"/>
    <text x="0" y="8" text-anchor="middle" font-family="Arial,sans-serif" font-size="22" font-weight="900" fill="#fff">A</text>
    <text x="0" y="75" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="600" fill="#a3a3a3">Authority</text>
  </g>
  <g transform="translate(700,160)">
    <path d="M0-40 L30-24 L30,12 Q30,40 0,55 Q-30,40 -30,12 L-30,-24 Z" fill="#2563eb" opacity="0.8" stroke="#2563eb" stroke-width="2"/>
    <text x="0" y="8" text-anchor="middle" font-family="Arial,sans-serif" font-size="24" font-weight="900" fill="#fff">T</text>
    <text x="0" y="75" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="600" fill="#a3a3a3">Trust</text>
  </g>
  <!-- Connecting lines -->
  <line x1="280" y1="160" x2="370" y2="160" stroke="#2563eb" stroke-width="1" opacity="0.3"/>
  <line x1="430" y1="160" x2="520" y2="160" stroke="#2563eb" stroke-width="1" opacity="0.3"/>
  <line x1="580" y1="160" x2="670" y2="160" stroke="#2563eb" stroke-width="1" opacity="0.3"/>
  <!-- Title -->
  <text x="900" y="145" text-anchor="middle" font-family="Arial,sans-serif" font-size="36" font-weight="900" fill="#fff" letter-spacing="-0.03em">E-E-A-T in 2026</text>
  <text x="900" y="175" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="500" fill="#a3a3a3">How Google Decides Who to Trust</text>
  <!-- Bottom bar -->
  <rect x="0" y="390" width="1200" height="10" fill="#2563eb" opacity="0.6"/>
</svg>
