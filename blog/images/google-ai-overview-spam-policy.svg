<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020617"/>
      <stop offset="50%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#1E293B"/>
    </linearGradient>
    <linearGradient id="red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DC2626"/>
      <stop offset="100%" style="stop-color:#EF4444"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16A34A"/>
      <stop offset="100%" style="stop-color:#22C55E"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#DC2626;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#DC2626;stop-opacity:0"/>
    </radialGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#000" flood-opacity="0.45"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <clipPath id="mainClip"><rect x="0" y="0" width="400" height="400" rx="12"/></clipPath>
  </defs>

  <g clip-path="url(#mainClip)">
    <rect width="400" height="400" fill="url(#bg)"/>
    <circle cx="200" cy="160" r="180" fill="url(#glow1)"/>

    <!-- Subtle grid -->
    <g opacity="0.08" stroke="#334155" stroke-width="0.5">
      <line x1="0" y1="80" x2="400" y2="80"/>
      <line x1="0" y1="160" x2="400" y2="160"/>
      <line x1="0" y1="240" x2="400" y2="240"/>
      <line x1="0" y1="320" x2="400" y2="320"/>
      <line x1="80" y1="0" x2="80" y2="400"/>
      <line x1="160" y1="0" x2="160" y2="400"/>
      <line x1="240" y1="0" x2="240" y2="400"/>
      <line x1="320" y1="0" x2="320" y2="400"/>
    </g>

    <!-- Warning card -->
    <g filter="url(#shadow)">
      <rect x="60" y="40" width="280" height="130" rx="14" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
      <circle cx="95" cy="75" r="18" fill="url(#red)" opacity="0.9"/>
      <text x="95" y="81" font-family="Arial,sans-serif" font-size="20" fill="white" text-anchor="middle" font-weight="bold">!</text>
      <rect x="125" y="65" width="150" height="10" rx="5" fill="#EF4444" opacity="0.7"/>
      <rect x="125" y="83" width="110" height="8" rx="4" fill="#475569" opacity="0.5"/>
      <rect x="125" y="99" width="130" height="8" rx="4" fill="#475569" opacity="0.3"/>
      <rect x="85" y="125" width="90" height="26" rx="13" fill="url(#red)" opacity="0.85"/>
      <text x="130" y="142" font-family="Arial,sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="700">PENALTY</text>
      <rect x="185" y="125" width="90" height="26" rx="13" fill="none" stroke="#475569" stroke-width="1.5"/>
      <text x="230" y="142" font-family="Arial,sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle">AUDIT</text>
    </g>

    <!-- Headline -->
    <text x="200" y="218" font-family="Arial,sans-serif" font-size="32" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="-1">AI OVERVIEW</text>
    <text x="200" y="252" font-family="Arial,sans-serif" font-size="26" fill="#EF4444" text-anchor="middle" font-weight="700">SPAM POLICY</text>

    <!-- Red accent -->
    <rect x="130" y="268" width="140" height="3" rx="1.5" fill="url(#red)" opacity="0.7"/>

    <!-- Sub info -->
    <text x="200" y="300" font-family="Arial,sans-serif" font-size="13" fill="#94A3B8" text-anchor="middle" font-weight="500">Google Updates · July 2026</text>

    <!-- Green check -->
    <g filter="url(#glow)">
      <circle cx="340" cy="350" r="28" fill="url(#green)" opacity="0.12"/>
      <circle cx="340" cy="350" r="18" fill="url(#green)" opacity="0.2"/>
      <text x="340" y="357" font-family="Arial,sans-serif" font-size="20" fill="#22C55E" text-anchor="middle" font-weight="bold">✓</text>
    </g>
  </g>
</svg>