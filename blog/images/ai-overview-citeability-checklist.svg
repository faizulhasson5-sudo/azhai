<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fafafa"/>
      <stop offset="100%" style="stop-color:#f0f0f0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>
  <text x="400" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" fill="#0a0a0a" text-anchor="middle">9-Factor AI Overview Citeability Checklist</text>
  <!-- Factor 1: Ranking (Gate) -->
  <rect x="30" y="55" width="240" height="90" fill="#fee2e2" rx="6" stroke="#fca5a5" stroke-width="1"/>
  <text x="50" y="78" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#dc2626">GATE (Must Pass)</text>
  <text x="50" y="96" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#0a0a0a">1. Ranking Position</text>
  <text x="50" y="112" font-family="system-ui,sans-serif" font-size="10" fill="#374151">Top-10 ranking = 4x more likely</text>
  <text x="50" y="126" font-family="system-ui,sans-serif" font-size="10" fill="#374151">to be cited. Position 1-3 is ideal.</text>
  <!-- Factor 2-3: Content -->
  <rect x="285" y="55" width="240" height="90" fill="#dbeafe" rx="6" stroke="#93c5fd" stroke-width="1"/>
  <text x="305" y="78" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#2563eb">CONTENT</text>
  <text x="305" y="96" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#0a0a0a">2. Direct-Answer Paragraph</text>
  <text x="305" y="112" font-family="system-ui,sans-serif" font-size="10" fill="#374151">Sub-80-word answer under H2</text>
  <text x="305" y="126" font-family="system-ui,sans-serif" font-size="10" fill="#374151">question. Clean, liftable snippet.</text>
  <rect x="540" y="55" width="240" height="90" fill="#dbeafe" rx="6" stroke="#93c5fd" stroke-width="1"/>
  <text x="560" y="78" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#2563eb">CONTENT</text>
  <text x="560" y="96" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#0a0a0a">3. Question-Shaped H2s</text>
  <text x="560" y="112" font-family="system-ui,sans-serif" font-size="10" fill="#374151">H2s phrased as the query the</text>
  <text x="560" y="126" font-family="system-ui,sans-serif" font-size="10" fill="#374151">model is answering.</text>
  <!-- Factor 4-5: Schema -->
  <rect x="30" y="160" width="240" height="90" fill="#f0fdf4" rx="6" stroke="#86efac" stroke-width="1"/>
  <text x="50" y="183" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#16a34a">SCHEMA</text>
  <text x="50" y="201" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#0a0a0a">4. Article Schema</text>
  <text x="50" y="217" font-family="system-ui,sans-serif" font-size="10" fill="#374151">datePublished, dateModified,</text>
  <text x="50" y="231" font-family="system-ui,sans-serif" font-size="10" fill="#374151">author, headline = freshness.</text>
  <rect x="285" y="160" width="240" height="90" fill="#f0fdf4" rx="6" stroke="#86efac" stroke-width="1"/>
  <text x="305" y="183" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#16a34a">SCHEMA</text>
  <text x="305" y="201" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#0a0a0a">5. FAQPage Schema</text>
  <text x="305" y="217" font-family="system-ui,sans-serif" font-size="10" fill="#374151">Mark up real FAQ blocks.</text>
  <text x="305" y="231" font-family="system-ui,sans-serif" font-size="10" fill="#374151">Dual signal compounds.</text>
  <rect x="540" y="160" width="240" height="90" fill="#f0fdf4" rx="6" stroke="#86efac" stroke-width="1"/>
  <text x="560" y="183" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#16a34a">SCHEMA</text>
  <text x="560" y="201" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#0a0a0a">6. Speakable Markup</text>
  <text x="560" y="217" font-family="system-ui,sans-serif" font-size="10" fill="#374151">Mark passages you most want</text>
  <text x="560" y="231" font-family="system-ui,sans-serif" font-size="10" fill="#374151">lifted for voice/AI extraction.</text>
  <!-- Factor 7-9: Authority -->
  <rect x="30" y="265" width="240" height="90" fill="#fefce8" rx="6" stroke="#fde68a" stroke-width="1"/>
  <text x="50" y="288" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#a16207">AUTHORITY</text>
  <text x="50" y="306" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#0a0a0a">7. Entity Authority</text>
  <text x="50" y="322" font-family="system-ui,sans-serif" font-size="10" fill="#374151">sameAs links to LinkedIn, Wikipedia,</text>
  <text x="50" y="336" font-family="system-ui,sans-serif" font-size="10" fill="#374151">official social profiles.</text>
  <rect x="285" y="265" width="240" height="90" fill="#fefce8" rx="6" stroke="#fde68a" stroke-width="1"/>
  <text x="305" y="288" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#a16207">AUTHORITY</text>
  <text x="305" y="306" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#0a0a0a">8. Topical Clusters</text>
  <text x="305" y="322" font-family="system-ui,sans-serif" font-size="10" fill="#374151">10 linked articles on sub-topics</text>
  <text x="305" y="336" font-family="system-ui,sans-serif" font-size="10" fill="#374151">beat one 6,000-word page.</text>
  <rect x="540" y="265" width="240" height="90" fill="#fefce8" rx="6" stroke="#fde68a" stroke-width="1"/>
  <text x="560" y="288" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#a16207">AUTHORITY</text>
  <text x="560" y="306" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#0a0a0a">9. Freshness Signals</text>
  <text x="560" y="322" font-family="system-ui,sans-serif" font-size="10" fill="#374151">dateModified in schema + recent</text>
  <text x="560" y="336" font-family="system-ui,sans-serif" font-size="10" fill="#374151">content updates = freshness.</text>
  <!-- Bottom note -->
  <rect x="30" y="380" width="740" height="100" fill="#fff" rx="6" stroke="#e5e7eb" stroke-width="1"/>
  <text x="400" y="408" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="600" fill="#0a0a0a" text-anchor="middle">The Golden Rule</text>
  <text x="400" y="430" font-family="system-ui,sans-serif" font-size="11" fill="#374151" text-anchor="middle">Ranking is the gate. Formatting is the tiebreaker. Schema amplifies.</text>
  <text x="400" y="448" font-family="system-ui,sans-serif" font-size="11" fill="#374151" text-anchor="middle">You cannot format your way into an AI Overview from position 30.</text>
  <text x="400" y="466" font-family="system-ui,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">Win classic top-10 first, then layer on citeability factors.</text>
</svg>