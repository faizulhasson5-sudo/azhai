<svg xmlns="http://www.w3.org/2000/svg" width="800" height="350" viewBox="0 0 800 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#1E293B"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563EB"/>
      <stop offset="100%" style="stop-color:#3B82F6"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="800" height="350" fill="url(#bg)"/>
  <g opacity="0.06">
    <line x1="0" y1="50" x2="800" y2="50" stroke="#334155" stroke-width="0.5"/>
    <line x1="0" y1="100" x2="800" y2="100" stroke="#334155" stroke-width="0.5"/>
    <line x1="0" y1="150" x2="800" y2="150" stroke="#334155" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="800" y2="200" stroke="#334155" stroke-width="0.5"/>
    <line x1="0" y1="250" x2="800" y2="250" stroke="#334155" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="800" y2="300" stroke="#334155" stroke-width="0.5"/>
  </g>
  <text x="400" y="35" font-family="Arial,sans-serif" font-size="16" fill="#94A3B8" text-anchor="middle" font-weight="600" letter-spacing="2">RECOVERY WORKFLOW</text>
  <g filter="url(#shadow)">
    <rect x="20" y="55" width="140" height="80" rx="12" fill="#1E293B" stroke="#2563EB" stroke-width="1.5"/>
    <text x="90" y="85" font-family="Arial,sans-serif" font-size="24" fill="#3B82F6" text-anchor="middle">1</text>
    <text x="90" y="105" font-family="Arial,sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="600">Audit Content</text>
    <text x="90" y="122" font-family="Arial,sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">Review spam policies</text>
  </g>
  <line x1="160" y1="95" x2="190" y2="95" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <g filter="url(#shadow)">
    <rect x="190" y="55" width="140" height="80" rx="12" fill="#1E293B" stroke="#2563EB" stroke-width="1.5"/>
    <text x="260" y="85" font-family="Arial,sans-serif" font-size="24" fill="#3B82F6" text-anchor="middle">2</text>
    <text x="260" y="105" font-family="Arial,sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="600">Fix Violations</text>
    <text x="260" y="122" font-family="Arial,sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">Remove bad content</text>
  </g>
  <line x1="330" y1="95" x2="360" y2="95" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <g filter="url(#shadow)">
    <rect x="360" y="55" width="140" height="80" rx="12" fill="#1E293B" stroke="#2563EB" stroke-width="1.5"/>
    <text x="430" y="85" font-family="Arial,sans-serif" font-size="24" fill="#3B82F6" text-anchor="middle">3</text>
    <text x="430" y="105" font-family="Arial,sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="600">Improve Quality</text>
    <text x="430" y="122" font-family="Arial,sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">Add E-E-A-T signals</text>
  </g>
  <line x1="500" y1="95" x2="530" y2="95" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <g filter="url(#shadow)">
    <rect x="530" y="55" width="140" height="80" rx="12" fill="#1E293B" stroke="#7C3AED" stroke-width="1.5"/>
    <text x="600" y="85" font-family="Arial,sans-serif" font-size="24" fill="#8B5CF6" text-anchor="middle">4</text>
    <text x="600" y="105" font-family="Arial,sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="600">Add Schema</text>
    <text x="600" y="122" font-family="Arial,sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">Structured data markup</text>
  </g>
  <line x1="670" y1="95" x2="700" y2="95" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <g filter="url(#shadow)">
    <rect x="700" y="55" width="80" height="80" rx="12" fill="#1E293B" stroke="#22C55E" stroke-width="2"/>
    <text x="740" y="92" font-family="Arial,sans-serif" font-size="28" fill="#22C55E" text-anchor="middle" font-weight="bold">✓</text>
    <text x="740" y="115" font-family="Arial,sans-serif" font-size="10" fill="#22C55E" text-anchor="middle" font-weight="600">RECOVER</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="60" y="170" width="680" height="155" rx="14" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <text x="400" y="200" font-family="Arial,sans-serif" font-size="14" fill="#94A3B8" text-anchor="middle" font-weight="600" letter-spacing="1">TIMELINE &amp; EXPECTATIONS</text>
    <g>
      <rect x="100" y="220" width="200" height="6" rx="3" fill="#334155"/>
      <rect x="100" y="220" width="40" height="6" rx="3" fill="#EF4444"/>
      <text x="100" y="245" font-family="Arial,sans-serif" font-size="11" fill="#EF4444">Week 1-2</text>
      <text x="100" y="260" font-family="Arial,sans-serif" font-size="10" fill="#94A3B8">Audit &amp; fix violations</text>
    </g>
    <g>
      <rect x="320" y="220" width="200" height="6" rx="3" fill="#334155"/>
      <rect x="320" y="220" width="100" height="6" rx="3" fill="#F59E0B"/>
      <text x="320" y="245" font-family="Arial,sans-serif" font-size="11" fill="#F59E0B">Month 1-3</text>
      <text x="320" y="260" font-family="Arial,sans-serif" font-size="10" fill="#94A3B8">Content improvement</text>
    </g>
    <g>
      <rect x="540" y="220" width="200" height="6" rx="3" fill="#334155"/>
      <rect x="540" y="220" width="200" height="6" rx="3" fill="#22C55E"/>
      <text x="540" y="245" font-family="Arial,sans-serif" font-size="11" fill="#22C55E">Month 3-6</text>
      <text x="540" y="260" font-family="Arial,sans-serif" font-size="10" fill="#94A3B8">Reassessment &amp; recovery</text>
    </g>
    <text x="400" y="300" font-family="Arial,sans-serif" font-size="11" fill="#64748B" text-anchor="middle" font-style="italic">"Recovery from spam updates is not instant" — Google Search Documentation</text>
  </g>
