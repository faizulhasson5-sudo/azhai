<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#141414"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <line x1="0" y1="100" x2="1200" y2="100" stroke="#1a1a1a"/>
  <line x1="0" y1="200" x2="1200" y2="200" stroke="#1a1a1a"/>
  <line x1="0" y1="300" x2="1200" y2="300" stroke="#1a1a1a"/>
  <line x1="0" y1="400" x2="1200" y2="400" stroke="#1a1a1a"/>
  <line x1="0" y1="500" x2="1200" y2="500" stroke="#1a1a1a"/>
  <line x1="200" y1="0" x2="200" y2="630" stroke="#1a1a1a"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#1a1a1a"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#1a1a1a"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#1a1a1a"/>
  <line x1="1000" y1="0" x2="1000" y2="630" stroke="#1a1a1a"/>
  <!-- Search result mockup -->
  <rect x="100" y="120" width="500" height="180" rx="8" fill="#171717" stroke="#262626"/>
  <text x="130" y="160" fill="#2563eb" font-size="18" font-family="system-ui, sans-serif">Your Blog Post Title | Brand Name</text>
  <text x="130" y="190" fill="#a3a3a3" font-size="13" font-family="system-ui, sans-serif">https://yoursite.com/blog-post</text>
  <text x="130" y="225" fill="#fafafa" font-size="14" font-family="system-ui, sans-serif">Compelling meta description that entices clicks. Highlight value proposition and include a call to action.</text>
  <text x="130" y="260" fill="#525252" font-size="12" font-family="system-ui, sans-serif">155 characters max · Include keyword · Match search intent</text>
  <!-- CTR meter -->
  <rect x="680" y="150" width="420" height="300" rx="8" fill="#171717" stroke="#262626"/>
  <text x="890" y="195" fill="#a3a3a3" font-size="14" text-anchor="middle" font-family="system-ui, sans-serif">Click-Through Rate</text>
  <text x="890" y="270" fill="#2563eb" font-size="64" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="700">+32%</text>
  <text x="890" y="310" fill="#3b82f6" font-size="16" text-anchor="middle" font-family="system-ui, sans-serif">with optimized descriptions</text>
  <!-- Progress bar -->
  <rect x="730" y="350" width="320" height="8" rx="4" fill="#262626"/>
  <rect x="730" y="350" width="230" height="8" rx="4" fill="#2563eb"/>
  <text x="730" y="385" fill="#525252" font-size="12" font-family="system-ui, sans-serif">Before</text>
  <text x="1050" y="385" fill="#2563eb" font-size="12" text-anchor="end" font-family="system-ui, sans-serif">After</text>
</svg>
