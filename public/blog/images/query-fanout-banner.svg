  <text x="300" y="148" font-family="system-ui,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">sub-query 1</text>
  <text x="450" y="128" font-family="system-ui,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">sub-query 2</text>
